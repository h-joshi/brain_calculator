document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 x2=\"-10\" y2=\"4\" stroke=\"#e8ff3d\" strokewidth=\"1\"><\u002Fline>\n              <line x1=\"0\" y1=\"-5\" x2=\"0\" y2=\"5\" stroke=\"#e8ff3d\" strokewidth=\"1\"><\u002Fline>\n              <ellipse cx=\"34\" cy=\"0\" rx=\"15\" ry=\"21\" fill=\"#141414\" stroke=\"#e8ff3d\" strokewidth=\"3\"><\u002Fellipse>\n              <circle cx=\"34\" cy=\"0\" r=\"5.5\" fill=\"none\" stroke=\"#e8ff3d\" strokewidth=\"2\"><\u002Fcircle>\n            <\u002Fg>\n\n            <!-- fretting arm -->\n            <line x1=\"60\" y1=\"62\" x2=\"34\" y2=\"78\" stroke=\"#e8ff3d\" strokewidth=\"3\"><\u002Fline>\n\n            <!-- strumming arm, animated -->\n            <g style=\"animation: strum 0.45s ease-in-out infinite; transform-origin: 60px 62px;\">\n              <line x1=\"60\" y1=\"62\" x2=\"88\" y2=\"86\" stroke=\"#e8ff3d\" strokewidth=\"3\"><\u002Fline>\n            <\u002Fg>\n\n            <sc-if value=\"{{ showDiploma }}\" hint-placeholder-val=\"{{ false }}\">\n              <g transform=\"translate(10,90) rotate(-15)\">\n                <rect x=\"0\" y=\"0\" width=\"20\" height=\"6\" rx=\"3\" fill=\"none\" stroke=\"#e8ff3d\" strokewidth=\"2\"><\u002Frect>\n                <line x1=\"0\" y1=\"3\" x2=\"20\" y2=\"3\" stroke=\"#e8ff3d\" strokewidth=\"1\"><\u002Fline>\n              <\u002Fg>\n            <\u002Fsc-if>\n          <\u002Fg>\n        <\u002Fsvg>\n        <div style=\"color:#888; font-size:11px; font-weight:600; margin-top:2px;\">\n          {{ scholarLabel }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- breakdown -->\n      <sc-if value=\"{{ hasLetters }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom: 22px;\">\n          <sc-for list=\"{{ breakdown }}\" as=\"b\" hint-placeholder-count=\"0\">\n            <div style=\"background:#1e1e1e; border:1px solid #2e2e2e; border-radius:12px; padding:8px 10px; text-align:center; min-width:52px;\">\n              <div style=\"font-family:'Bungee',sans-serif; color:#e8ff3d; font-size:15px;\">{{ b.letter }}<\u002Fdiv>\n              <div style=\"color:#999; font-size:10px; margin-top:2px; font-weight:600; white-space:nowrap;\">{{ b.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- result -->\n      <div style=\"background: linear-gradient(160deg, #1a1a1a, #0d0d0d); border: 2px solid #2a2a2a; border-radius: 24px; padding: 26px 20px; text-align:center; position:relative; overflow:hidden;\">\n        <div style=\"position:absolute; inset:0; opacity:0.05; background-image: repeating-linear-gradient(0deg, #e8ff3d 0px, #e8ff3d 1px, transparent 1px, transparent 4px); animation: scan 3s linear infinite;\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"color:#777; font-size:11px; letter-spacing:2px; font-weight:700; margin-bottom:8px;\">\n            AVERAGE BRAIN SCORE\n          <\u002Fdiv>\n          <div key=\"{{ scoreDisplay }}\" style=\"font-family:'Bungee',sans-serif; font-size:56px; color:#e8ff3d; line-height:1; animation: popIn 0.4s ease; text-shadow: 0 0 30px rgba(232,255,61,0.4);\">\n            {{ scoreDisplay }}\n          <\u002Fdiv>\n          <div style=\"color:#fff; font-size:14px; font-weight:600; margin-top:14px; padding:0 8px;\">\n            {{ verdict }}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ clearAll }}\" style=\"width:100%; margin-top:16px; background:transparent; border:2px solid #2a2a2a; color:#666; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; padding:12px; border-radius:14px; cursor:pointer;\" style-hover=\"border-color:#e8ff3d; color:#e8ff3d;\">\n        CLEAR\n      <\u002Fbutton>\n\n      <p style=\"text-align:center; color:#3a3a3a; font-size:10px; margin: 20px 0 0; font-weight:500;\">\n        results are not peer-reviewed. or reviewed at all.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst LETTER_DATA = {\n  M: { label: 'No brain', val: 0 },\n  A: { label: '99%', val: 99 },\n  H: { label: 'No brain', val: 0 },\n  P: { label: 'No brain', val: 0 },\n  E: { label: 'Unlimited', val: 100 },\n  L: { label: 'Nothing', val: 0 },\n  O: { label: '80%', val: 80 },\n  N: { label: '0%', val: 0 },\n  Z: { label: '99%', val: 99 },\n  R: { label: '99.99%', val: 99.99 },\n  G: { label: 'No brain', val: 0 },\n  S: { label: 'Unlimited', val: 100 },\n  B: { label: '0%', val: 0 },\n  W: { label: '50%', val: 50 },\n  X: { label: 'A little bit', val: 5 },\n  I: { label: 'Infinity', val: 100 },\n  D: { label: '50%', val: 50 },\n  C: { label: 'Infinity', val: 100 },\n  J: { label: 'No brain', val: 0 },\n  F: { label: '0%', val: 0 },\n  K: { label: '0%', val: 0 },\n  Q: { label: '10%', val: 10 },\n  T: { label: 'A little bit', val: 5 },\n  U: { label: 'A little bit', val: 5 },\n  Y: { label: 'Nothing', val: 0 },\n  V: { label: 'No brain', val: 0 },\n};\n\nconst INFINITE_LETTERS = ['E', 'S', 'I', 'C'];\n\nclass Component extends DCLogic {\n  state = { raw: '' };\n\n  focusInput = () => {\n    if (this.inputRef) this.inputRef.focus();\n  };\n\n  onInputChange = (e) => {\n    const cleaned = e.target.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 10);\n    this.setState({ raw: cleaned });\n  };\n\n  clearAll = () => {\n    this.setState({ raw: '' });\n    this.focusInput();\n  };\n\n  getVerdict(hasInfinite, avg, count) {\n    if (count === 0) return \"waiting for a hero's name...\";\n    if (avg >= 90) return 'unhinged genius energy 🧠✨';\n    if (avg >= 70) return 'big brain. certified.';\n    if (avg >= 50) return 'actually kind of scary, ngl';\n    if (avg >= 30) return \"there's... something in there\";\n    if (avg >= 10) return 'mid brain energy at best';\n    return 'certified NPC 🥔 — no brain detected';\n  }\n\n  renderVals() {\n    const raw = this.state.raw;\n    const chars = raw.split('');\n\n    const letterSlots = Array.from({ length: 10 }, (_, i) => {\n      const ch = chars[i];\n      const filled = !!ch;\n      return {\n        char: ch || '',\n        bg: filled ? '#e8ff3d' : '#1a1a1a',\n        color: filled ? '#0d0d0d' : '#444',\n        border: filled ? '#e8ff3d' : '#2a2a2a',\n      };\n    });\n\n    const breakdown = chars.map((ch, i) => {\n      const d = LETTER_DATA[ch];\n      return { letter: ch, label: d ? d.label : '?', key: ch + i };\n    });\n\n    const values = chars.map((ch) => (LETTER_DATA[ch] ? LETTER_DATA[ch].val : 0));\n    const hasInfinite = chars.some((ch) => INFINITE_LETTERS.includes(ch));\n    const count = chars.length;\n    const avg = count > 0 ? values.reduce((a, b) => a + b, 0) / count : 0;\n\n    let scoreDisplay = '—';\n    if (count > 0) {\n      scoreDisplay = Math.round(avg * 100) / 100 + '%';\n    }\n\n    const showDazedEyes = count > 0 && avg < 20;\n    const showGlasses = avg >= 40;\n    const showCap = avg >= 80;\n    const showDiploma = avg >= 95;\n    const showSparkles = avg >= 95;\n    const showPlainEyes = !showDazedEyes;\n\n    let scholarLabel = 'garage band reject';\n    if (count > 0) {\n      if (avg >= 95) scholarLabel = 'headlining professor';\n      else if (avg >= 80) scholarLabel = 'graduating rockstar';\n      else if (avg >= 60) scholarLabel = 'studious shredder';\n      else if (avg >= 40) scholarLabel = 'four-eyed riffer';\n      else if (avg >= 20) scholarLabel = 'figuring it out';\n      else scholarLabel = 'certified NPC with a guitar';\n    }\n\n    return {\n      inputRef: (el) => { this.inputRef = el; },\n      rawValue: raw,\n      focusInput: this.focusInput,\n      onInputChange: this.onInputChange,\n      clearAll: this.clearAll,\n      letterSlots,\n      charCountLabel: count + ' / 10 characters',\n      hasLetters: count > 0,\n      breakdown,\n      scoreDisplay,\n      verdict: this.getVerdict(hasInfinite, avg, count),\n      showDazedEyes,\n      showGlasses,\n      showCap,\n      showDiploma,\n      showSparkles,\n      showPlainEyes,\n      scholarLabel,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
